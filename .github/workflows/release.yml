name: Build and release desktop apps

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} app
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-latest
            artifact-name: installer-macos
            artifact-path: release/*.dmg
          - platform: Windows
            runner: windows-latest
            artifact-name: installer-windows
            artifact-path: release/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build installer
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          path: release-artifacts
          merge-multiple: true

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json contains an invalid release version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag $TAG already exists. Bump package.json version before pushing to main." >&2
            exit 1
          fi

          mapfile -d '' installers < <(
            find release-artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -print0
          )
          if (( ${#installers[@]} != 2 )); then
            echo "Expected one macOS DMG and one Windows EXE; found ${#installers[@]} installers." >&2
            printf '%s\n' "${installers[@]}" >&2
            exit 1
          fi

          gh release create "$TAG" "${installers[@]}" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
